<!doctype html>
<html>
    <head>
        <title>software</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <p>all under CC0</p>
        <ul>
            <li>
                <img src="others/fallback.png"/>
                <h2 class="center">AUR30LA</h2>
                <p class="b">Released on 15 May 2026</p>
                <p class="b">3D Game Engine</p>
                <p class="b">
                    <span class="l">Linux</span>
                    <button onclick="window.open('https://github.com/ai-radu/AUR30LA',)"
                        aria-label="Open Github link in a new tab">
                        More Info
                    </button>
                </p>
            </li>
<!--Currency Converter-->
            <li>
                <h2 class="center">Currency Converter</h2>
                <form id="converter-form">
                    <div class="center">
                        <label for = "amount-currency">Amount</label>
                        <input type="number" id="amount-currency" placeholder="Enter amount" value="100" required style="width: 100%;">
                    </div>
                    <div class="center">
                        <label for = "from-currency">From</label>
                        <select class="full" id="from-currency"></select>
                    </div>
                    <div class="center">
                        <label for = "to-currency">To</label>
                        <select class="full" id="to-currency"></select>
                    </div>
                    <div class="center">
                        <button class="center" type="submit">Convert</button>
                    </div>
                    <div class="center">
                        <p id="result-currency">Amount</p>
                    </div>
                </form>
            </li>
<!--Calculator-->
            <li>
                <div>
                    <h2 class="center">Calculator</h2>
                    <div class="center" style="margin: 0px 10px 0px 10px;">
                        <input class="full" type="text" readonly id="result-calculator">
                    </div>
                    <div class="cbase">
                        <div class="b">
                            <button class="cbtn">7</button>
                            <button class="cbtn">8</button>
                            <button class="cbtn">9</button>
                            <button class="cbtn">C</button>
                        </div>
                        <div class="b">
                            <button class="cbtn">4</button>
                            <button class="cbtn">5</button>
                            <button class="cbtn">6</button>
                            <button class="cbtn">/</button>
                        </div>
                        <div class="b">
                            <button class="cbtn">1</button>
                            <button class="cbtn">2</button>
                            <button class="cbtn">3</button>
                            <button class="cbtn">X</button>
                        </div>
                        <div class="b">
                            <button class="cbtn">0</button>
                            <button class="cbtn">+</button>
                            <button class="cbtn">-</button>
                            <button class="cbtn">=</button>
                        </div>
                    </div>
                </div>
            </li>
<!--Random Color Generator-->
            <li>
                <h2 class="center">Random Color Generator</h2>
                <p class="center">click on one of the boxes to copy the value to clipboard</p>
                <span class="center">
                    <button id="generate-colors">
                        ⟳ Generate
                    </button>
                </span>
                <ul>
                    <div class="color-box">
                        <div class="color" style="background-color: rgb(238, 255, 0)"></div>
                        <div class="color-info">
                            <span class="hex-value">text</span>
                        </div>
                    </div>
                    <div class="color-box">
                        <div class="color" style="background-color: rgb(160, 15, 111)"></div>
                        <div class="color-info">
                            <span class="hex-value">text</span>
                        </div>
                    </div>
                    <div class="color-box">
                        <div class="color" style="background-color: rgb(107, 182, 125)"></div>
                        <div class="color-info">
                            <span class="hex-value">text</span>
                        </div>
                    </div>
                    <div class="color-box">
                        <div class="color" style="background-color: rgb(17, 83, 138)"></div>
                        <div class="color-info">
                            <span class="hex-value">text</span>
                        </div>
                    </div>
                    <div class="color-box">
                        <div class="color" style="background-color: rgb(172, 25, 25)"></div>
                        <div>
                            <span class="hex-value">text</span>
                        </div>
                    </div>
                </ul>
            </li>
        </ul>
        <script src="script.js"></script>
    </body>
</html>
